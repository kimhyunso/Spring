server:
  port: 8082


spring:
  application:
    name: second-service


eureka:
  instance:
    instance-id: ${spring.cloud.client.hostname}:${spring.application.instance_id:${random.value}}
  client:
    register-with:eureka: true
    fetch-register: true
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka
